# Per-PR ephemeral dev environment — issue #274.
#
# Layered on top of docker-compose.yml. Builds the four app images from the PR
# checkout (like docker-compose.build.yml) and enables the capture-token-gated
# dev login (/dev/login) so the visual-snapshot harness can screenshot the
# authenticated operator console.
#
#   docker compose -f docker-compose.yml -f docker-compose.pr-dev.yml \
#     --env-file .env.pr-dev -p ${PR}-dev up -d --build
#
# Per-PR isolation:
#   • the compose PROJECT name (-p ${PR}-dev) scopes containers + volumes, so
#     `down -v` wipes only this PR's data;
#   • .env.pr-dev (generated by pr-dev-env-up.yml) sets deterministic per-PR host
#     ports, BIND_ADDR=0.0.0.0 (LAN-browseable), and random per-PR secrets
#     (POSTGRES_PASSWORD, OIDC_WEB_CLIENT_SECRET, PR_DEV_LOGIN_TOKEN).
#
# The base file already exposes the knobs we need (WEB_PORT, IDENTITY_PORT,
# BIND_ADDR, WEBAPP_HTTP, IDP_PUBLIC_HTTP, POSTGRES_*, OIDC_WEB_CLIENT_SECRET,
# SEED_SAMPLE_DATA), so this override only adds the build contexts + dev-login env.

services:
  identity:
    build:
      context: .
      dockerfile: SuperStatus.Identity/Dockerfile

  api:
    build:
      context: .
      dockerfile: SuperStatus.ApiService/Dockerfile

  web:
    build:
      context: .
      dockerfile: SuperStatus.Web/Dockerfile
    environment:
      # Capture-token-gated dev login for the Playwright snapshot harness. The
      # route at /dev/login is only mapped when both are set (see Web/Program.cs).
      PR_DEV_LOGIN_ENABLED: ${PR_DEV_LOGIN_ENABLED:-}
      PR_DEV_LOGIN_TOKEN: ${PR_DEV_LOGIN_TOKEN:-}
